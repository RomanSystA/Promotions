openapi: 3.0.0
info:
   version: 1.0.0
   title: Рекламные предложения
   description: Метод описывает данные рекламных предложений, которые загружаются на странице пользователя
paths:
   /api/promotions/offers/{msisdn}:
     get:
       summary: получение рекламных предложений
       x-integration:
         type: SOAP
         operation: getSSDetailsOffer
       security:
         - BearerAuth: []
       parameters:
         - name: msisdn
           in: path
           description: идентификатор рекламного предложения
           required: true
           schema:
             type: integer
         - name: inp
           in: query
           description: идентификатор рекламного предложения
           required: true
           schema:
             type: string
             example: abc
       responses:
         '200':
           description: Положительный ответ на запрос, отображение рекламного контента
           content:
             application/json:
               schema:
                 - $ref: '#/components/schemas/list'
                 
       '401':
         description: Unauthorized
       '403':
         description: ERROR_MSISDN
       '404':
         description: Not found
       '500':
         description: Server error
                
components:
   schemas:
     list:
       type: object
       description: набор настраиваемых параметров
       properties:
         full_ofr_desc:
           type: string
           description: описание рекламного предложения
         rate_wo_discount: 
           type: integer
           description: стоимость предложения без скидки
         rate_with_discount:
           type: integer
           description: стоимость предложения со скидкой
         offerType:
           type: string
           description: тип предложения

   securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
                       
                       
                       
                       
                       
                       
                       
                       
                     
